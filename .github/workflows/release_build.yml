name: Build release

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      XPOSED_REPO: Xposed-Modules-Repo/com.wizpizz.onepluspluslauncher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x gradlew
      - name: Decode signing key
        id: signing_key
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: release.keystore
          encodedString: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      - name: Build signed release
        env:
          SIGNING_KEY_STORE_PATH: ${{ steps.signing_key.outputs.filePath }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: onepluspluslauncher-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
      - name: Read module version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          VERSION_CODE=$(sed -n 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n1)
          VERSION_NAME=$(sed -n 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n1)
          test -n "$VERSION_CODE" && test -n "$VERSION_NAME"
          echo "xposed_tag=${VERSION_CODE}-${VERSION_NAME}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" app/build/outputs/apk/release/app-release.apk --generate-notes --verify-tag
      - name: Publish Xposed mirror release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.xposed_tag }}" \
            --repo "$XPOSED_REPO" \
            --title "${{ github.ref_name }}" \
            --notes "Synced from ${{ github.repository }} ${{ github.ref_name }}" \
            app/build/outputs/apk/release/app-release.apk
