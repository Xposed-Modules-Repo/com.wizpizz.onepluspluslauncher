name: Verify Android build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: verify-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x gradlew
      - name: Test, lint, and assemble
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: onepluspluslauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  mirror-source:
    name: Mirror verified source
    needs: verify
    if: >-
      github.event_name == 'push' &&
      github.repository == 'oenderg/OnePlusPlusLauncher' &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      XPOSED_REPO: Xposed-Modules-Repo/com.wizpizz.onepluspluslauncher
      XPOSED_BOOTSTRAP_HEAD: f32a4a48397a2950ca5be96d99017f162de2d188
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure Xposed repository credentials
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: gh auth setup-git
      - name: Mirror master to Xposed main
        run: |
          git remote add xposed "https://github.com/${XPOSED_REPO}.git"
          git fetch --no-tags xposed main

          remote_head="$(git rev-parse refs/remotes/xposed/main)"

          if git merge-base --is-ancestor "$remote_head" HEAD; then
            git push xposed HEAD:refs/heads/main
            exit 0
          fi

          if [ "$remote_head" != "$XPOSED_BOOTSTRAP_HEAD" ]; then
            echo "Xposed main has diverged at $remote_head; refusing to overwrite it."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads xposed archive/metadata-only >/dev/null 2>&1; then
            git push xposed "$remote_head:refs/heads/archive/metadata-only"
          fi

          git push \
            --force-with-lease="refs/heads/main:$remote_head" \
            xposed \
            HEAD:refs/heads/main
